version: v1alpha1
# Sensitivity sweep — Paranoia Level 3.
# See docs/design/security-evaluation.md for the PL/threshold pairing rationale.
port: 8080

global:
  accept:
    methods: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS, TRACE, CONNECT]
    content_types: []
  inspection:
    sensitivity: 3
    anomaly_threshold: 9

routes:
  - upstream: http://localhost:19000
