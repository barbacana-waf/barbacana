version: v1alpha1
port: 18080

global:
  mode: blocking

routes:
  - upstream: http://localhost:19000
    accept:
      content_types:
        - multipart/form-data
    multipart:
      file_limit: 2
      file_size: 1KB
      allowed_types:
        - image/png
        - image/jpeg
      double_extension: true
