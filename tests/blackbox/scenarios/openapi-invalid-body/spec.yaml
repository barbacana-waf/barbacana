openapi: "3.0.3"
info:
  title: Test API
  version: "1.0"
paths:
  /users:
    post:
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                age:
                  type: integer
                  minimum: 0
      responses:
        "201":
          description: Created
