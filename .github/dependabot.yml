version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: friday
    groups:
      github-actions:
        applies-to: version-updates
        patterns: ["*"]
      github-actions-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: friday
    groups:
      gomod:
        applies-to: version-updates
        patterns: ["*"]
      gomod-security:
        applies-to: security-updates
        patterns: ["*"]
