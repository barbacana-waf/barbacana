name: security-scan

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-latest:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Trivy scan of :latest
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/barbacana-waf/barbacana:latest
          version: v0.70.0
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-daily

  govulncheck-latest-tag:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/load-versions
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Check out the most recent release tag
        run: |
          tag=$(git describe --tags --abbrev=0 --match 'v*')
          echo "scanning $tag"
          git checkout --detach "$tag"
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          govulncheck ./...

  ftw:
    # Informational — runs the full OWASP CRS FTW regression suite against
    # a live barbacana and uploads the report. Never gates.
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/load-versions
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install go-ftw (pinned)
        run: GOBIN="${GITHUB_WORKSPACE}/bin" go install github.com/coreruleset/go-ftw/v2@${GO_FTW_VERSION}
      - name: Run FTW suite
        run: make test-ftw
      - name: Upload FTW report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ftw-report
          path: tests/ftw/reports/
          retention-days: 30

  gotestwaf:
    # Informational — runs Wallarm's gotestwaf attack suite against a live
    # barbacana and uploads the PDF + JSON reports. Never gates.
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/load-versions
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install gotestwaf (pinned)
        run: GOBIN="${GITHUB_WORKSPACE}/bin" go install github.com/wallarm/gotestwaf/cmd/gotestwaf@${GOTESTWAF_VERSION}
      - name: Run gotestwaf
        run: make test-gotestwaf
      - name: Upload gotestwaf report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gotestwaf-report
          path: tests/gotestwaf/reports/
          retention-days: 30
