name: ci

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/load-versions
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: make rules
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m
      - run: go vet ./...
      - run: go mod tidy && git diff --exit-code -- go.mod go.sum

  vuln-scan:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/load-versions
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck (Go vuln DB, reachability-aware)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          govulncheck ./...
      - name: Trivy fs (broad ecosystem DB, version-match)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: table

  test:
    needs: [lint, vuln-scan]
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/load-versions
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: make rules
      - run: go test -race ./...

  integration:
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: make rules
      - run: make build
      - run: make test-integration

  image:
    needs: [integration]
    # Skip the image job on the release commit itself — release.yml pushes both
    # the commit and the tag, and the tag run handles build/sign/SBOM.
    if: "${{ !(github.event_name == 'push' && github.ref == 'refs/heads/master' && startsWith(github.event.head_commit.message, 'release: v')) }}"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image-ref: ${{ steps.ko.outputs.image-ref }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/load-versions
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: ko-build/setup-ko@d982fec422852203cfb2053a8ec6ad302280d04d # v0.8
        with:
          version: ${{ env.KO_VERSION }}
      - name: Log in to GitHub Packages
        run: echo "${{ secrets.GITHUB_TOKEN }}" | ko login ghcr.io --username "${{ github.actor }}" --password-stdin
      - run: make rules

      - name: Compute tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "version=${BARBACANA_VERSION}-pr${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=${BARBACANA_VERSION}-master-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image + SPDX SBOM
        id: ko
        env:
          KO_DOCKER_REPO: ghcr.io/barbacana-waf/barbacana
          VERSION: ${{ steps.tag.outputs.version }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "${{ steps.tag.outputs.push }}" = "false" ]; then
            PLATFORM=linux/amd64
          else
            PLATFORM=all
          fi
          ARGS=(--bare --platform="${PLATFORM}" --sbom=spdx --sbom-dir=./sbom --tags="${VERSION}" --image-refs=./image.refs)
          if [ "${{ steps.tag.outputs.push }}" = "false" ]; then
            ARGS+=(--local)
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ARGS+=(--tags="${VERSION},latest")
          fi
          ko build "${ARGS[@]}" .
          echo "image-ref=$(head -n1 image.refs)" >> "$GITHUB_OUTPUT"

      - name: Trivy scan (PR gate — fail on CRITICAL/HIGH)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.ko.outputs.image-ref }}
          version: v0.70.0
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          format: table

      - name: Cosign keyless sign (tag releases only)
        if: steps.tag.outputs.push == 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}
      - name: Sign image + attest SBOM
        if: steps.tag.outputs.push == 'true' && startsWith(github.ref, 'refs/tags/v')
        env:
          IMG: ${{ steps.ko.outputs.image-ref }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMG}"

          # IMG is the multi-arch index digest; ko writes a matching
          # <app>-index.spdx.json for it. Fall back to any SPDX file
          # (covers single-arch PR builds).
          SBOM=$(find ./sbom -type f -name "*-index.spdx.json" | head -1)
          if [ -z "${SBOM}" ]; then
            SBOM=$(find ./sbom -type f -name "*.spdx.json" | head -1)
          fi
          [ -n "${SBOM}" ] || { echo "::error::no SBOM file found in ./sbom/"; exit 1; }
          echo "attesting SBOM: ${SBOM}"

          cosign attest --yes --predicate "${SBOM}" --type spdxjson "${IMG}"

      - name: Upload SBOM as build artifact
        if: steps.tag.outputs.push == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-spdx
          path: sbom/
