name: ci

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/load-versions
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: make rules
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m
      - run: go vet ./...
      - run: go mod tidy && git diff --exit-code -- go.mod go.sum

  vuln-scan:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/load-versions
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck (Go vuln DB, reachability-aware)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          govulncheck ./...
      - name: Trivy fs (broad ecosystem DB, version-match)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: table

  test:
    needs: [lint, vuln-scan]
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/load-versions
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: make rules
      - run: go test -race ./...

  integration:
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: make rules
      - run: make build
      - run: make test-integration

  blackbox:
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/load-versions
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # Install hurl at the pinned version so blackbox scenarios have the
      # request runner they call out to. No official apt package, so we
      # fetch the upstream tarball. Version comes from versions.mk.
      - name: Install hurl
        run: |
          set -euo pipefail
          archive="hurl-${HURL_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL -o "$archive" \
            "https://github.com/Orange-OpenSource/hurl/releases/download/${HURL_VERSION}/${archive}"
          tar -xzf "$archive"
          sudo mv "hurl-${HURL_VERSION}-x86_64-unknown-linux-gnu/bin/hurl" /usr/local/bin/
          rm -rf "$archive" "hurl-${HURL_VERSION}-x86_64-unknown-linux-gnu"
          hurl --version

      - run: make rules
      - run: make test-blackbox

  image:
    needs: [integration, blackbox]
    # Skip the image job on the release commit itself — release.yml pushes both
    # the commit and the tag, and the tag run handles build/sign/SBOM.
    if: "${{ !(github.event_name == 'push' && github.ref == 'refs/heads/master' && startsWith(github.event.head_commit.message, 'release: v')) }}"
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      id-token: write
    outputs:
      image-ref: ${{ steps.ko.outputs.image-ref }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/load-versions
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9
        with:
          version: ${{ env.KO_VERSION }}
      - name: Log in to GitHub Packages
        run: echo "${{ secrets.GITHUB_TOKEN }}" | ko login ghcr.io --username "${{ github.actor }}" --password-stdin

      # Trigger-dependent build parameters. Release tags publish to the main
      # package; master pushes publish to -edge (keeps the main package page
      # free of per-commit dev clutter); PRs build locally for the Trivy gate.
      - name: Compute build parameters
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSION="${BARBACANA_VERSION}-pr${{ github.event.pull_request.number }}"
            {
              echo "publish=false"
              echo "repo=ghcr.io/barbacana-waf/barbacana"
              echo "tags=${VERSION}"
              echo "platform=linux/amd64"
              echo "local=--local"
              echo "version=${VERSION}"
            } >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            {
              echo "publish=true"
              echo "repo=ghcr.io/barbacana-waf/barbacana"
              echo "tags=${VERSION},latest"
              echo "platform=all"
              echo "local="
              echo "version=${VERSION}"
            } >> "$GITHUB_OUTPUT"
          else
            VERSION="${BARBACANA_VERSION}-master-${GITHUB_SHA:0:7}"
            {
              echo "publish=true"
              echo "repo=ghcr.io/barbacana-waf/barbacana-edge"
              echo "tags=${VERSION}"
              echo "platform=all"
              echo "local="
              echo "version=${VERSION}"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        id: ko
        env:
          REPO: ${{ steps.tag.outputs.repo }}
          VERSION: ${{ steps.tag.outputs.version }}
          COMMIT: ${{ github.sha }}
          KO_TAGS: ${{ steps.tag.outputs.tags }}
          KO_PLATFORM: ${{ steps.tag.outputs.platform }}
          KO_LOCAL: ${{ steps.tag.outputs.local }}
          IMAGE_SOURCE: https://github.com/${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "${{ steps.tag.outputs.publish }}" = "true" ]; then
            make image-publish
          else
            make image
          fi
          echo "image-ref=$(head -n1 image.refs)" >> "$GITHUB_OUTPUT"

      - name: Trivy scan (PR gate — fail on CRITICAL/HIGH)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.ko.outputs.image-ref }}
          version: v0.70.0
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          format: table

      - name: Install cosign (release tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Sign image
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          IMG: ${{ steps.ko.outputs.image-ref }}
        run: make sign IMG="${IMG}"

      - name: Generate CycloneDX SBOM
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: make sbom

      - name: Attest SBOM to image
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          IMG: ${{ steps.ko.outputs.image-ref }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: make attest IMG="${IMG}"

      - name: Upload SBOM as build artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: barbacana-*.cdx.json
